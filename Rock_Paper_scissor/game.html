<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="container">
        <h1>Rock, Paper, Scissors</h1>
        <div class="game">
            <div class="choices">
                <button class="choice" id="rock">✊ Rock</button>
                <button class="choice" id="paper">✋ Paper</button>
                <button class="choice" id="scissors">✌ Scissors</button>
            </div>
            <div class="result">
                <p>Player Choice: <span id="player-score">0</span></p>
                <p>Computer Choice: <span id="computer-score">0</span></p>
                <p>Draw: <span id="draw"></span></p>

            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
